services:
  cli:
    build: .
    image: kaggle-slayer:latest
    volumes:
      - ./competition_data:/app/competition_data
      - ./mlruns:/app/mlruns
      - ${HOME}/.kaggle:/home/slayer/.kaggle:ro
    environment:
      MLFLOW_TRACKING_URI: file:/app/mlruns

  dashboard:
    build: .
    image: kaggle-slayer:latest
    entrypoint: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      MLFLOW_TRACKING_URI: file:/app/mlruns

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
